<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOA Data Extraction Dashboard - Automated</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .header h1 { color: #333; margin-bottom: 10px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 { color: #333; margin-bottom: 20px; font-size: 1.5em; }
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 5px;
        }
        .stat-label { font-weight: 600; color: #555; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: #667eea; }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        textarea { min-height: 150px; resize: vertical; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); }
        .btn-success { background: linear-gradient(135deg, #28a745 0%, #218838 100%); }
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .full-width { grid-column: 1 / -1; }
        .extraction-status {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 20px;
            border-radius: 5px;
            margin: 15px 0;
        }
        .extraction-status.running {
            background: #d1ecf1;
            border-color: #17a2b8;
        }
        .table-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .table-controls input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            font-size: 14px;
        }
        .table-info {
            color: #666;
            font-size: 14px;
        }
        .data-table-container {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #667eea;
            color: white;
        }
        th {
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            border-bottom: 2px solid #764ba2;
            white-space: nowrap;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #e9ecef;
            font-size: 13px;
        }
        tbody tr:hover {
            background: #f8f9fa;
        }
        tbody tr:nth-child(even) {
            background: #fafafa;
        }
        tbody tr:nth-child(even):hover {
            background: #f0f0f0;
        }
        .empty-value {
            color: #999;
            font-style: italic;
        }
        .has-value {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 SOA Data Extraction Dashboard - Automated</h1>
            <p>Process JSON data manually or extract automatically for all STIs</p>
        </div>
        
        <div class="dashboard">
            <div class="card">
                <h2>📊 Status Overview</h2>
                <div id="status-container">Loading...</div>
            </div>
            
            <div class="card">
                <h2>🤖 Automated Extraction</h2>
                <div id="extraction-container">
                    <div class="form-group">
                        <label>Extraction Method:</label>
                        <select id="extraction-method">
                            <option value="playwright">Playwright (Recommended)</option>
                            <option value="selenium">Selenium</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start From STI Index:</label>
                        <input type="number" id="start-from" value="0" min="0" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 5px;">
                    </div>
                    <div class="form-group">
                        <label>Max STIs to Process (leave empty for all):</label>
                        <input type="number" id="max-stis" min="1" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 5px;">
                    </div>
                    <div class="actions">
                        <button id="start-extraction" class="btn-success" onclick="startExtraction()">🚀 Start Automated Extraction</button>
                        <button id="stop-extraction" class="btn-danger" onclick="stopExtraction()" disabled>⏹️ Stop Extraction</button>
                    </div>
                    <div id="extraction-status"></div>
                </div>
            </div>
            
            <div class="card">
                <h2>📋 Process STI Data (Manual)</h2>
                <form id="process-form">
                    <div class="form-group">
                        <label for="sti-select">Select STI:</label>
                        <select id="sti-select" required>
                            <option value="">Loading STIs...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="json-input">JSON Data:</label>
                        <textarea id="json-input" placeholder='{"applicationName":"App Name","criticalityTier":"C1",...}' required></textarea>
                    </div>
                    <button type="submit">✅ Process STI</button>
                </form>
                <div id="result-message"></div>
            </div>
            
            <div class="card full-width">
                <h2>📥 Batch Processing</h2>
                <div class="form-group">
                    <label for="batch-json">Batch JSON:</label>
                    <textarea id="batch-json" placeholder='{"AAP-001":{"applicationName":"App1",...}}' style="min-height: 200px;"></textarea>
                </div>
                <button onclick="processBatch()">🚀 Process Batch</button>
                <button onclick="exportCSV()">📥 Export CSV</button>
                <div id="batch-result"></div>
            </div>
            
            <div class="card full-width">
                <h2>📊 Extracted Data Table</h2>
                <div class="table-controls">
                    <input type="text" id="table-search" placeholder="🔍 Search STIs..." onkeyup="filterTable()">
                    <span class="table-info" id="table-info">Loading...</span>
                    <button onclick="loadDataTable()">🔄 Refresh</button>
                </div>
                <div class="data-table-container">
                    <table id="data-table">
                        <thead>
                            <tr id="table-header"></tr>
                        </thead>
                        <tbody id="table-body">
                            <tr><td colspan="10" style="text-align: center; padding: 40px;">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let extractionInterval = null;
        
        let tableData = [];
        
        window.addEventListener('DOMContentLoaded', function() {
            loadStatus();
            loadSTIs();
            checkExtractionStatus();
            loadDataTable();
        });
        
        setInterval(loadStatus, 5000);
        setInterval(checkExtractionStatus, 2000);
        setInterval(loadDataTable, 10000); // Refresh table every 10 seconds
        
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                if (data.error) {
                    document.getElementById('status-container').innerHTML = `<div class="alert alert-error">Error: ${data.error}</div>`;
                    return;
                }
                const extractedPercent = ((data.extracted / data.total) * 100).toFixed(1);
                document.getElementById('status-container').innerHTML = `
                    <div class="stat">
                        <span class="stat-label">Total STIs</span>
                        <span class="stat-value">${data.total}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Extracted</span>
                        <span class="stat-value">${data.extracted} (${extractedPercent}%)</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Pending</span>
                        <span class="stat-value">${data.pending}</span>
                    </div>
                    <div style="margin-top: 20px;">
                        <strong>Progress:</strong>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${extractedPercent}%">${extractedPercent}%</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('status-container').innerHTML = `<div class="alert alert-error">Error: ${error.message}</div>`;
            }
        }
        
        async function checkExtractionStatus() {
            try {
                const response = await fetch('/api/extract/status');
                const status = await response.json();
                
                const container = document.getElementById('extraction-status');
                const startBtn = document.getElementById('start-extraction');
                const stopBtn = document.getElementById('stop-extraction');
                
                if (status.running) {
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    const elapsed = status.start_time ? Math.floor((new Date() - new Date(status.start_time)) / 1000) : 0;
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    container.innerHTML = `
                        <div class="extraction-status running">
                            <strong>🔄 Extraction Running</strong><br>
                            Current STI: ${status.current_sti || 'Starting...'}<br>
                            Processed: ${status.processed} / ${status.total}<br>
                            Failed: ${status.failed}<br>
                            Elapsed: ${minutes}m ${seconds}s
                        </div>
                    `;
                } else {
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    if (status.processed > 0) {
                        container.innerHTML = `
                            <div class="extraction-status">
                                <strong>✅ Extraction Complete</strong><br>
                                Processed: ${status.processed}<br>
                                Failed: ${status.failed}
                            </div>
                        `;
                    } else {
                        container.innerHTML = '';
                    }
                }
            } catch (error) {
                console.error('Error checking extraction status:', error);
            }
        }
        
        async function startExtraction() {
            const method = document.getElementById('extraction-method').value;
            const startFrom = parseInt(document.getElementById('start-from').value) || 0;
            const maxStis = document.getElementById('max-stis').value ? parseInt(document.getElementById('max-stis').value) : null;
            
            try {
                const response = await fetch('/api/extract/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({method, start_from: startFrom, max_stis: maxStis})
                });
                const result = await response.json();
                if (result.success) {
                    showMessage('extraction-status', '✅ Extraction started!', 'success');
                    checkExtractionStatus();
                } else {
                    showMessage('extraction-status', `❌ Error: ${result.error}`, 'error');
                }
            } catch (error) {
                showMessage('extraction-status', `❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function stopExtraction() {
            try {
                const response = await fetch('/api/extract/stop', {method: 'POST'});
                const result = await response.json();
                showMessage('extraction-status', '⏹️ Extraction stopped', 'info');
                checkExtractionStatus();
            } catch (error) {
                showMessage('extraction-status', `❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function loadSTIs() {
            try {
                const response = await fetch('/api/stis');
                const stis = await response.json();
                const select = document.getElementById('sti-select');
                select.innerHTML = '<option value="">Select an STI...</option>';
                stis.forEach(sti => {
                    const option = document.createElement('option');
                    option.value = sti;
                    option.textContent = sti;
                    select.appendChild(option);
                });
            } catch (error) {
                document.getElementById('sti-select').innerHTML = '<option value="">Error loading STIs</option>';
            }
        }
        
        document.getElementById('process-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const sti = document.getElementById('sti-select').value;
            const jsonInput = document.getElementById('json-input').value;
            if (!sti || !jsonInput) {
                showMessage('result-message', 'Please select STI and provide JSON', 'error');
                return;
            }
            try {
                JSON.parse(jsonInput);
                const response = await fetch('/api/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({sti, json: jsonInput})
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    showMessage('result-message', `✅ Updated ${sti}!`, 'success');
                    loadStatus();
                    document.getElementById('json-input').value = '';
                } else {
                    showMessage('result-message', `❌ Error: ${result.error}`, 'error');
                }
            } catch (error) {
                showMessage('result-message', `❌ Invalid JSON: ${error.message}`, 'error');
            }
        });
        
        async function processBatch() {
            const batchJson = document.getElementById('batch-json').value;
            if (!batchJson) {
                showMessage('batch-result', 'Please provide batch JSON', 'error');
                return;
            }
            try {
                const batchData = JSON.parse(batchJson);
                const response = await fetch('/api/batch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({batch: batchData})
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    showMessage('batch-result', `✅ Processed ${result.processed} STIs!`, 'success');
                    loadStatus();
                } else {
                    showMessage('batch-result', `❌ Error: ${result.error}`, 'error');
                }
            } catch (error) {
                showMessage('batch-result', `❌ Invalid JSON: ${error.message}`, 'error');
            }
        }
        
        function exportCSV() {
            window.open('/api/export', '_blank');
        }
        
        async function loadDataTable() {
            try {
                const response = await fetch('/api/data');
                
                // Check if response is OK
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`HTTP ${response.status}: ${text.substring(0, 100)}`);
                }
                
                // Check content type
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    throw new Error(`Expected JSON but got ${contentType}. Response: ${text.substring(0, 100)}`);
                }
                
                const result = await response.json();
                
                if (result.error) {
                    document.getElementById('table-body').innerHTML = 
                        `<tr><td colspan="10" style="text-align: center; padding: 40px; color: red;">Error: ${result.error}</td></tr>`;
                    return;
                }
                
                tableData = result.data || [];
                const columns = result.columns || [];
                
                if (columns.length === 0) {
                    document.getElementById('table-body').innerHTML = 
                        `<tr><td colspan="10" style="text-align: center; padding: 40px;">No columns found in data</td></tr>`;
                    return;
                }
                
                // Build header
                const headerRow = document.getElementById('table-header');
                headerRow.innerHTML = columns.map(col => `<th>${col}</th>`).join('');
                
                // Build body
                renderTable(tableData);
                
                // Update info
                document.getElementById('table-info').textContent = 
                    `Showing ${tableData.length} STIs`;
            } catch (error) {
                console.error('Error loading data table:', error);
                document.getElementById('table-body').innerHTML = 
                    `<tr><td colspan="10" style="text-align: center; padding: 40px; color: red;">Error loading data: ${error.message}<br><small>Check browser console for details</small></td></tr>`;
            }
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; padding: 40px;">No data available</td></tr>';
                return;
            }
            
            // Get columns from first row
            const columns = Object.keys(data[0]);
            
            tbody.innerHTML = data.map(row => {
                return `<tr>${columns.map(col => {
                    const value = row[col] || '';
                    const isEmpty = value === '' || value === 'empty value' || value === null;
                    const cellClass = isEmpty ? 'empty-value' : 'has-value';
                    const displayValue = isEmpty ? 'empty value' : String(value);
                    return `<td class="${cellClass}">${escapeHtml(displayValue)}</td>`;
                }).join('')}</tr>`;
            }).join('');
        }
        
        function filterTable() {
            const searchTerm = document.getElementById('table-search').value.toLowerCase();
            
            if (!searchTerm) {
                renderTable(tableData);
                document.getElementById('table-info').textContent = `Showing ${tableData.length} STIs`;
                return;
            }
            
            const filtered = tableData.filter(row => {
                return Object.values(row).some(val => 
                    String(val || '').toLowerCase().includes(searchTerm)
                );
            });
            
            renderTable(filtered);
            document.getElementById('table-info').textContent = 
                `Showing ${filtered.length} of ${tableData.length} STIs`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showMessage(containerId, message, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
